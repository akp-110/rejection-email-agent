[build]
  publish = "app"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[build.environment]
  NODE_VERSION = "18"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=self, microphone=(), geolocation=()"

[[redirects]]
  from = "/"
  to = "/rejection-email-agent.html"
  status = 200
  force = true

[[redirects]]
  from = "/api/parse"
  to = "/.netlify/functions/parse"
  status = 200

[[redirects]]
  from = "/api/ocr"
  to = "/.netlify/functions/ocr"
  status = 200
